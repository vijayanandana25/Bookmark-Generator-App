apiVersion: apps/v1
kind: Deployment
metadata:
  name: bookmark-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bookmark-frontend
  template:
    metadata:
      labels:
        app: bookmark-frontend
    spec:
      containers:
        - name: frontend
          image: <ECR-URI>/bookmark-frontend
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
spec:
  type: LoadBalancer
  selector:
    app: bookmark-frontend
  ports:
    - port: 3000
      targetPort: 3000
