apiVersion: apps/v1
kind: Deployment
metadata:
  name: bookmark-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bookmark-backend
  template:
    metadata:
      labels:
        app: bookmark-backend
    spec:
      containers:
        - name: backend
          image: <ECR-URI>/bookmark-backend
          ports:
            - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  selector:
    app: bookmark-backend
  ports:
    - port: 5000
      targetPort: 5000
